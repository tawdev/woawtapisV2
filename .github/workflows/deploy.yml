name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # ---------------------------------------------------
            # Find the project directory
            # ---------------------------------------------------
            cd /var/www/woawTapis

            # ---------------------------------------------------
            # Pull latest changes
            # ---------------------------------------------------
            git pull -r origin main

            # ---------------------------------------------------
            # BACKEND DEPLOYMENT (Laravel)
            # ---------------------------------------------------
            echo "Deploying Backend (Laravel)..."
            cd /var/www/woawTapis/backend
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd /var/www/woawTapis

            # ---------------------------------------------------
            # FRONTEND DEPLOYMENT (Next.js)
            # ---------------------------------------------------
            echo "Deploying Frontend (Next.js)..."
            cd /var/www/woawTapis/frontend
            npm install --legacy-peer-deps
            npm run build
            pm2 restart wowtapis-front || pm2 start npm --name wowtapis-front -- start

            echo "Deployment successful!"
            pm2 list
