name: Deploy to VPS

on:
  push:
    branches:
      - main # Change this to your main branch (e.g., master) if different

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }} # Typically 22
          script: |
            # Navigate to the project directory (Change this path if your folder is named differently on Hostinger)
            cd /var/www/woawTapis || cd ~/woawtapisV2 || cd ~/public_html/woawTapis
            
            # Pull the latest changes from the repository
            git pull origin main
            
            # ---------------------------------------------------
            # BACKEND DEPLOYMENT (Laravel)
            # ---------------------------------------------------
            echo "Deploying Backend..."
            cd backend
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ..
            
            # ---------------------------------------------------
            # FRONTEND DEPLOYMENT (Next.js)
            # ---------------------------------------------------
            echo "Deploying Frontend..."
            cd frontend
            npm install
            npm run build
            # Restart the PM2 process (assuming it's named 'frontend')
            pm2 restart frontend || pm2 restart all
            
            echo "Deployment successful!"
