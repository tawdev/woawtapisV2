name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            
            # Go to project directory (Trying most likely names)
            if [ -d "/var/www/woawTapisV2" ]; then
              cd /var/www/woawTapisV2
            elif [ -d "/var/www/woawtapisV2" ]; then
              cd /var/www/woawtapisV2
            elif [ -d "/var/www/woawTapis" ]; then
              cd /var/www/woawTapis
            else
              echo "Error: Project directory not found in /var/www/"
              exit 1
            fi
            
            # Update code
            git pull origin main

            # Backend Deployment
            cd backend
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --no-interaction
            php artisan migrate --force
            php artisan config:cache

            # Frontend Deployment
            cd ../frontend
            npm install --legacy-peer-deps
            npm run build
            pm2 restart wowtapis-front --update-env
            
            echo "Deployment successful!"
